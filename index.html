<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Praise Brand Graphics</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
:root{--bg:#070709;--bg2:#0e0e12;--bg3:#141419;--cyan:#00f5d4;--purple:#7b2fff;--pink:#f72585;--gold:#ffd166;--text:#e8e8f0;--muted:#6a6a80;--border:rgba(255,255,255,.07)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
#authScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;overflow-y:auto}
.auth-box{background:var(--bg3);border:1px solid rgba(0,245,212,.15);border-radius:24px;padding:36px 28px;width:100%;max-width:440px;margin:auto}
.auth-logo-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:6px}
.auth-logo-img{height:46px;width:auto}
.auth-brand{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.06em;line-height:1.1}
.c1{color:var(--cyan)}.c2{color:var(--purple)}.c3{color:#fff}
.auth-sub{text-align:center;font-size:11px;color:var(--muted);letter-spacing:.14em;margin-bottom:24px}
.tab-row{display:flex;gap:8px;margin-bottom:24px;background:rgba(255,255,255,.04);border-radius:12px;padding:4px}
.tab{flex:1;padding:10px;border-radius:9px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;letter-spacing:.06em;border:none;transition:all .2s}
.tab.active{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#000}
.tab:not(.active){background:transparent;color:var(--muted)}
.fg{margin-bottom:13px}
.fl{display:block;font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--muted);margin-bottom:5px}
.fi{width:100%;padding:10px 13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.fi:focus{border-color:rgba(0,245,212,.4)}
.fi::placeholder{color:#333}
.ft{resize:vertical;min-height:75px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.aerr{color:var(--pink);font-size:12px;margin-bottom:10px;text-align:center;min-height:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:10px;padding:11px 22px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;letter-spacing:.06em;transition:all .18s;text-decoration:none}
.btn:active{transform:scale(.97)}
.bp{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#000}
.bg{background:transparent;border:1px solid rgba(0,245,212,.25);color:var(--cyan)}
.bd{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff}
.bs{padding:7px 16px;font-size:12px;border-radius:8px}
.bb{width:100%}
.topbar{position:sticky;top:0;z-index:200;background:rgba(7,7,9,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 18px;height:56px}
.logo-row{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-img{height:34px;width:auto}
.logo-txt{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.07em;line-height:1.1}
.tr{margin-left:auto;display:flex;align-items:center;gap:10px}
.av{border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--purple));display:inline-flex;align-items:center;justify-content:center;font-weight:800;color:#000;cursor:pointer;flex-shrink:0}
.page{display:none;padding-bottom:90px}
.page.active{display:block}
.wrap{max-width:680px;margin:0 auto;padding:26px 18px}
.card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:20px;padding:22px}
.csm{border-radius:14px;padding:15px 17px}
.badge{display:inline-flex;align-items:center;padding:4px 13px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.1em}
.bc{background:rgba(0,245,212,.1);border:1px solid rgba(0,245,212,.25);color:var(--cyan)}
.bg2{background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.25);color:var(--gold)}
.bpk{background:rgba(247,37,133,.1);border:1px solid rgba(247,37,133,.25);color:var(--pink)}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,10,14,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 14px}
.nb{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 14px}
.ni{font-size:1.2rem}
.nl{font-size:10px;letter-spacing:.1em;font-weight:700;color:var(--muted);transition:color .2s}
.nb.active .nl{color:var(--cyan)}
.cd{display:flex;gap:10px;flex-wrap:wrap}
.cdb{background:rgba(0,245,212,.07);border:1px solid rgba(0,245,212,.15);border-radius:12px;padding:10px 14px;text-align:center;min-width:60px}
.cdn{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--cyan);line-height:1}
.cdl{font-size:10px;color:var(--muted);letter-spacing:.12em;margin-top:2px}
.pt{background:rgba(255,255,255,.06);border-radius:6px;height:8px;overflow:hidden}
.pf{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width .5s}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:11px 22px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.dz{border:2px dashed rgba(255,255,255,.12);border-radius:16px;padding:38px 20px;text-align:center;cursor:pointer;transition:all .2s}
.dz:hover,.dz.drag{border-color:rgba(0,245,212,.35);background:rgba(0,245,212,.03)}
.st{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.06em;margin-bottom:4px}
.ss{color:var(--muted);font-size:13px;margin-bottom:22px}
.hg{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(0,245,212,.07) 0%,transparent 70%);pointer-events:none}
.r1{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000}
.r2{background:linear-gradient(135deg,#c0c0c0,#808080);color:#000}
.r3{background:linear-gradient(135deg,#cd7f32,#8b4513);color:#fff}
.ro{background:rgba(255,255,255,.08);color:var(--muted)}
.sb{width:30px;height:26px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--muted);transition:all .15s;font-family:'Syne',sans-serif}
.sb.sel{background:linear-gradient(135deg,var(--cyan),var(--purple));border:none;color:#000}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .35s ease both}
.w1{border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.04);border-radius:20px;padding:22px;margin-bottom:14px}
.w2{border:1px solid rgba(192,192,192,.25);background:rgba(192,192,192,.03);border-radius:20px;padding:22px;margin-bottom:14px}
.w3{border:1px solid rgba(205,127,50,.25);background:rgba(205,127,50,.03);border-radius:20px;padding:22px;margin-bottom:14px}
.rb{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.9rem;flex-shrink:0}
.pr{display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:6px 0;font-size:13px}
</style>

</head>
